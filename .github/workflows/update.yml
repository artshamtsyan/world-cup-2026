name: Update results
on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 min (UTC); GitHub may delay under load
  workflow_dispatch: {}       # allow manual run
permissions:
  contents: write
concurrency:
  group: update-results
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Fetch results from football-data.org
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/update.mjs
      - name: Commit data.json if changed
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "wc2026-bot"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "Update results (football-data.org) $(date -u +%FT%TZ)"
            git push
            echo "pushed updated data.json"
          else
            echo "no change"
          fi
